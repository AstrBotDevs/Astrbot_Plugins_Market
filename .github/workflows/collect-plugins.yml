name: Collect Plugin Information

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  collect-plugins:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: bash "scripts/collect_plugin_information/install_dependencies/run.sh"

    - name: Collect plugin information
      id: collect
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: bash "scripts/collect_plugin_information/collect_plugin_information/run.sh"

    - name: Stage file and Check for changes (handles new file case)
      id: check_changes
      run: bash "scripts/collect_plugin_information/stage_file_and_check_for_changes/run.sh"

    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: bash "scripts/collect_plugin_information/commit_and_push_changes/run.sh"
      env:
        PLUGINS_COUNT: ${{ steps.collect.outputs.plugins_count }}

    - name: Create summary
      if: always()
      run: bash "scripts/collect_plugin_information/create_summary/run.sh"
      env:
        PLUGINS_COUNT: ${{ steps.collect.outputs.plugins_count }}
        HAS_CHANGES: ${{ steps.check_changes.outputs.has_changes }}
